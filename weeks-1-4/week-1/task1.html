<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sensor Settings</title>

  <style>
    :root {
      --btn-primary: #CED4DA;
      --btn-primary-hover: #ADB5BD; 
      --btn-gold: #F6EBCD;
      --btn-red: #D15252;
      --bg: #F8F9FA;
      --text: #212529;
      --btn-text: #212529; 
    }

    * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        margin: 0;
      }

      form {
        max-width: 420px;
        margin: 0 auto;
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      label {
        display: block;
        margin-top: 16px;
        margin-bottom: 6px;
        font-weight: 600;
        color: var(--text);
      }

      input, select {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #d0d4d9;
        border-radius: 6px;
        font-size: 14px;
      }

      button {
        width: 100%;
        margin-top: 12px;
        padding: 11px 16px;
        background: var(--btn-primary);
        color: var(--btn-text);
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit
      }
      
      button:hover {
        background: var(--btn-primary-hover);
      }

      #gravity-compensation {
     
        width: 18px;         
        height: 18px;
        margin: 0;
        vertical-align: middle;
      }

      label[for="gravity-compensation"] {
        display: inline-block;     
        margin-right: 8px;
      }
  </style>
  </head>
  <body>
    <form action="" method="get">
        <h3>Sensor Settings</h3>

        <label for="duration">Duration (seconds)</label>
        <input type="number" id="duration" />

        <label for="gravity-compensation">Gravity Compensation</label>
        <input type="checkbox" id="gravity-compensation" />

        <label for="accel-range">Accelerometer range (±g)</label>
        <select name="accel-range" id="accel-range">
            <option value="">Please choose a range</option>
            <option value="2">±2g</option>
            <option value="4">±4g</option>
            <option value="8">±8g</option>
            <option value="16">±16g</option>
        </select>

        <label for="odr">Sample rate (ODR):</label>
        <select name="odr" id="odr">
            <option value="">Please choose a sample rate</option>
            <option value="12.5">12.5 Hz</option>
            <option value="26">26 Hz</option>
            <option value="52">52 Hz</option>
            <option value="104">104 Hz</option>
            <option value="208">208 Hz</option>
            <option value="416">416 Hz</option>
            <option value="833">833 Hz</option>
            <option value="1666">1666 Hz</option>
            <option value="3333">3333 Hz</option>
            <option value="6666">6666 Hz</option>
        </select>

        <button type="button">Start</button>
        <button type="button">Stop</button>
    </form>
  </body>
</html>
