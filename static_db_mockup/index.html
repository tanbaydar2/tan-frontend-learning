<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EVB-01 Sensor Dashboard</title>
  <link rel="icon" type="image/png" href="images/favicon.png">

    <style>
        * {
            box-sizing: border-box;
            /* flatten every element to normal weight in one place. Has to be
               here (not :root/body): browsers set headings bold via a direct
               UA rule, which beats inheritance — but an author * rule beats
               the UA rule by origin. Add weight back only where we accentuate. */
            font-weight: normal;
        }

        /* one baseline for the whole page; accentuate specific bits later */
        :root {
            --font-size: 18px;   /* all text (midpoint: base 18) */
            --icon-size: 24px;   /* all icons */

            /* grayscale palette for the dashboard cards (real color comes later) */
            --radius:     12px;      /* one corner radius for every card + control */
            --bg:         #f8f9fa;   /* faint page tint (cards lift off it) */
            --card-bg:    #ffffff;   /* card surface              */
            --border:     #d0d4d9;   /* hairline card border      */
            --fill:       #e9ecef;   /* selected chip / bar track */
            --chart-fill: #ced4da;   /* chart placeholder block   */
            --muted:      #6c757d;   /* de-emphasized text        */
            --hero:       #212529;   /* darkest ink — shutter      */

            /* first color pass — pills + capture button */
            --btn-primary:      #26b6b5;   /* selected pill fill (teal) */
            --text-dark:        #172b36;   /* unselected pill text       */
            --btn-cyan:         #BCF1F1;   /* unselected pill fill       */
            --btn-cyan-hover:   #AEEAEA;   /* unselected pill hover/active */
            --placeholder-navy: #003d5b;   /* capture button (placeholder) */

            /* depth + type pass — surfaces and secondary text */
            --surface-page:    #e6eaef;   /* page bg — cards lift off it */
            --surface-card:    #ffffff;   /* card surface               */
            --border-divider:  #e2e8f0;   /* hairlines if needed         */
            --text-muted:      #6b7280;   /* labels / secondary text     */
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            font-size: var(--font-size);
            background: var(--surface-page);
        }

        /* status bar: identity pushed LEFT, vitals pushed RIGHT,
           everything on one row and vertically centered */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
        }

        /* left group: logo + device name side by side */
        .identity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* right group: battery + temperature side by side */
        .vitals {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* logo: one icon size for every icon on the page */
        .logo {
            height: var(--icon-size);
            width: auto;
            display: block;
        }

        /* device name: browsers default an h1 to ~2em + bold; flatten it
           to the page baseline for now, accentuate later */
        .device-name {
            margin: 0;
            font-size: var(--font-size);
        }

        /*  CLAUDE CODE HANDLED THE BATTERY SECTION, since it is a mockup and a visual, i let it do it,
            will change it later when I can touch backend.*/
        .battery {
            position: relative;
            width: var(--icon-size);
            height: calc(var(--icon-size) * 0.6);
            padding: 2px;
            border: 1.5px solid;
            border-radius: 3px;
        }

        /* the little positive terminal sticking out the right side */
        .battery::after {
            content: "";
            position: absolute;
            top: 50%;
            right: -3px;
            transform: translateY(-50%);
            width: 2px;
            height: 40%;
            background: currentColor;
            border-radius: 0 2px 2px 0;
        }

        /* the charge fill (sits inside the 2px padding, so the shell shows) */
        .battery__fill {
            display: block;
            width: 100%;
            height: 100%;
            background: currentColor;
            border-radius: 1px;
        }

        /* =========================================================
           DASHBOARD GRID  ->  three cells below the status bar:
           chart-group | Stream/Record | Status. auto-fit so
           columns grow 1 -> 2 -> 3 as the viewport widens, no media
           queries. Gaps/padding are deliberately generous (Refactoring
           UI: "start with too much white space", tighten later).
           ========================================================= */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* grid cell: section label (on the page) above its card */
        .cell {
            display: flex;
            flex-direction: column;
        }

        /* shared frame for grid cells — separated by background, not a border */
        .card {
            background: var(--surface-card);
            border-radius: var(--radius);
            padding: 32px;
        }

        /* the one drawn heading; the rest are visually-hidden */
        .card__title {
            margin: 0 0 16px;
        }

        /* small muted section label — visual anchor, not a loud title */
        .section-label {
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* STATUS header line: label left, refresh action right-aligned */
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .status-header .section-label {
            margin: 0;
        }

        /* hide visually, keep for screen readers */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
            border: 0;
        }

        /* ---- Sensor config: channel pills ---- */
        .channels {
            display: flex;
            gap: 8px;
        }
        .channel {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--btn-cyan);
            color: var(--text-dark);
            font: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .channel.is-selected {
            background: var(--btn-primary);
            color: #ffffff;
            border-color: var(--btn-primary);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field--inline {
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        .field label {
            color: var(--muted);
        }
        .field select,
        .field input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font: inherit;
            background: var(--card-bg);
        }

        /* ---- Live Data: white frame holding an inset empty-plot area ---- */
        .chart {
            padding: 16px;
            background: var(--surface-card);
            border-radius: 0;
        }
        .chart__empty {
            margin: 0;
            min-height: 288px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-page);
            border-radius: var(--radius);
            color: var(--text-muted);
        }

        /* ---- Stream / Record: the hero. The shutter is the DARKEST
           thing on the page, so it wins the squint test by contrast. ---- */
        .capture {
            display: flex;
            flex-direction: column;
            align-items: center;                          /* centered in the card */
            gap: 20px;                                    /* button -> segmented spacing */
            padding: 8px 16px 24px;                       /* +chart's 16px frame = ~24 to button */
            border-radius: 0 0 var(--radius) var(--radius); /* now the rounded bottom of the card */
        }
        .shutter {
            width: 64px;
            height: 64px;
            border: 0;
            border-radius: var(--radius);
            background: var(--placeholder-navy);
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .segmented {
            display: inline-flex;
            background: #e0e0e0;
            border-radius: 999px;
            padding: 3px;
        }
        .segment {
            padding: 8px 18px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .segment.is-selected {
            background: var(--btn-primary);
            color: #ffffff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }

        /* ---- Status: the quietest card. Lighter frame + muted text,
           no bold, so it never competes for attention. ---- */
        .status {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .readout {
            flex: 1;
            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;   /* term | value */
            gap: 12px 16px;
            align-items: center;
        }
        .readout dt {
            color: var(--text-muted);
            font-size: 16px;
        }
        .readout dd {
            margin: 0;
            text-align: right;
            color: var(--text-dark);
            font-size: 18px;
            font-weight: 600;
        }
        .bar {
            display: inline-block;
            width: 96px;
            height: 8px;
            background: var(--fill);
            border-radius: var(--radius);
            overflow: hidden;
            vertical-align: middle;
        }
        .bar__fill {
            display: block;
            height: 100%;
            width: 78%;
            background: var(--btn-primary);
        }
        .refresh {
            flex: none;
            border: 0;
            background: none;
            padding: 0;
            color: var(--btn-primary);
            font-size: var(--icon-size);
            line-height: 1;
            cursor: pointer;
            transition: color 0.15s ease;
        }

        /* ---- Chart group: sensor strip flush above chart ---- */
        .chart-group {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ---- Sensor config: slim horizontal strip ----
           Overrides .card padding + border-radius; keeps .card bg + border */
        .sensor-config {
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        /* disclosure bar: full-width, quiet; SPACE (not a border) separates it
           from the toggle row above. Reuses the light-button hover/active greys. */
        .disclosure {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 12px 0;
            border: 0;
            background: transparent;
            border-radius: var(--radius);
            color: var(--text-dark);
            font: inherit;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .disclosure__chevron {
            font-size: var(--icon-size);
            color: var(--btn-primary);
        }
        .disclosure:hover { background: var(--btn-cyan); }
        .disclosure:active { background: var(--btn-cyan-hover); }

        /* advanced panel: hidden now; Week 5 flips display to flex (no JS yet).
           gap:32 = category break (params -> gravity), the largest spacing. */
        .advanced-panel {
            display: none;
            flex-direction: column;
            gap: 32px;
            padding: 24px 0;
        }
        /* the three sampling selects: 24 between adjacent settings */
        .param-group {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ---- Gravity compensation control ---- */
        .gravity-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gravity-status {
            color: var(--muted);
        }

        /* ---- Hover / active states for all buttons ---- */
        /* Light / outlined buttons: hover darker, active darker still */
        .channel:hover { background: var(--btn-cyan-hover); }
        .channel:active { background: var(--btn-cyan-hover); }

        .refresh:hover { color: var(--btn-primary); }
        .refresh:active { color: var(--btn-primary); }

        .segment:hover { background: #f0f0f0; }
        .segment:active { background: #e0e0e0; }
        .segment.is-selected:hover { background: var(--btn-primary); }
        .segment.is-selected:active { background: var(--btn-primary); }

        /* Dark buttons: hover lighter, press dips with scale */
        .shutter:hover { background: var(--placeholder-navy); }
        .shutter:active { transform: scale(0.97); }

        .channel.is-selected:hover { background: var(--btn-primary); }
        .channel.is-selected:active { transform: scale(0.97); }

    </style>

    <link rel="stylesheet" href="styles.css">

</head>


<body>
    <header class="status-bar">
        <div class="identity">
            <img class="logo" src="images/favicon.png" alt="Evident Battery logo">
            <!-- the device name is what this page is "about" -> it's the h1 -->
            <h1 class="device-name" data-hostname>EVB-01-A3F2</h1>
        </div>

        <div class="vitals">
            <!-- battery is a CSS-drawn icon -->
            <div class="battery" role="img" aria-label="Battery">
                <span class="battery__fill"></span>
            </div>
            <span class="reading" data-temp>68&deg;F</span>
        </div>
    </header>

    <main class="dashboard">

        <!-- 1. OPERATE CELL — section label sits above + outside the card -->
        <div class="cell">
        <h2 class="section-label">Call to action</h2>

        <!-- CHART GROUP — sensor strip flush above chart -->
        <div class="chart-group">

            <section class="card sensor-config">

                <!-- 1. TOGGLE ROW — always-visible quick controls -->
                <div class="channels">
                    <button type="button" class="channel">Accel</button>
                    <button type="button" class="channel is-selected">Gyro</button>
                    <button type="button" class="channel is-selected">Temp</button>
                </div>

                <!-- 2. DISCLOSURE BAR — full-width button, bottom element when closed -->
                <button type="button" class="disclosure" aria-expanded="false" aria-controls="advanced-panel">
                    <span class="disclosure__label">Advanced settings</span>
                    <span class="disclosure__chevron">&#9662;</span>
                </button>

                <!-- 3. ADVANCED PANEL — hidden now; Week 5 flips display + rotates chevron -->
                <div class="advanced-panel" id="advanced-panel">
                    <div class="param-group">
                        <div class="field">
                            <label for="odr">Sample rate (Hz)</label>
                            <select id="odr">
                                <option>12.5</option><option>26</option><option>52</option>
                                <option selected>104</option><option>208</option><option>416</option>
                                <option>833</option><option>1666</option><option>3333</option><option>6666</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="accel-range">Accel range (g)</label>
                            <select id="accel-range"><option>2</option><option>4</option><option>8</option><option>16</option></select>
                        </div>
                        <div class="field">
                            <label for="gyro-range">Gyro range (dps)</label>
                            <select id="gyro-range"><option>125</option><option>250</option><option>500</option><option>1000</option><option>2000</option><option>4000</option></select>
                        </div>
                        <div class="field">
                            <label for="duration">Duration (s)</label>
                            <input type="number" id="duration" min="0" step="any" value="10">
                        </div>
                    </div>
                    <label class="field field--inline">
                        <span>Gravity compensation</span>
                        <span class="gravity-control">
                            <input type="checkbox" id="gravity-comp">
                            <span class="gravity-status">Off</span>
                        </span>
                    </label>
                </div>
            </section>

            <section class="live-data" aria-labelledby="live-heading">
                <h2 id="live-heading" class="visually-hidden">Live data</h2>
                <div class="chart"><p class="chart__empty">chart goes here</p></div>
            </section>

            <!-- STREAM / RECORD — now folded in as the bottom section of the operate card -->
            <section class="card capture" aria-labelledby="capture-heading">
                <h2 id="capture-heading" class="visually-hidden">Stream / Record</h2>
                <button type="button" class="shutter" aria-label="Start recording"></button>
                <div class="segmented">
                    <button type="button" class="segment">Stream</button>
                    <button type="button" class="segment is-selected">Record</button>
                </div>
            </section>

        </div>
        </div>

        <!-- 2. STATUS CELL — section label sits above + outside the card -->
        <div class="cell">
        <div class="status-header">
            <h2 id="status-heading" class="section-label">Status</h2>
            <button type="button" class="refresh" aria-label="Refresh device status">&#8635;</button>
        </div>
        <section class="card status" aria-labelledby="status-heading">
            <dl class="readout">
                <dt>Device</dt>      <dd>EVB-01-A3F2</dd>
                <dt>Firmware</dt>    <dd>v1.4.2</dd>
                <dt>Battery</dt>     <dd><span class="bar"><span class="bar__fill"></span></span> 78%</dd>
                <dt>Voltage</dt>     <dd>3.96 V</dd>
                <dt>Temperature</dt> <dd>68&deg;F</dd>
            </dl>
        </section>
        </div>

    </main>

</body>
</html>
